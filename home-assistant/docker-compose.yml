services:
  mosquitto:
    image: eclipse-mosquitto
    hostname: mosquitto
    container_name: mosquitto
    restart: "no"
    network_mode: host
    volumes:
      - $DATA_DIR/mosquitto:/etc/mosquitto
      - $DATA_DIR/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -t healthcheck -n || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  eufy-security-ws:
    container_name: eufy-security-ws
    image: bropat/eufy-security-ws
    depends_on:
      mosquitto:
        condition: service_started
    volumes:
      - $DATA_DIR/eufy-data:/data
    environment:
      - USERNAME=${EUFY_USERNAME}
      - PASSWORD=${EUFY_PASSWORD}
      - PORT=${EUFY_PORT}
    restart: "no"
    privileged: true
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 ${EUFY_PORT:-3001} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - $DATA_DIR/zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    restart: "no"
    network_mode: host
    privileged: true
    environment:
      - TZ=America/Edmonton
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8099 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  frigate:
    container_name: frigate
    privileged: true
    restart: "no"
    image: ghcr.io/blakeblackshear/frigate:stable
    shm_size: "128mb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    devices:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA_DIR/frigate/config:/config
      - /data/frigate:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    network_mode: host
      #ports:
      #- "5000:5000"
      #- "8554:8554" # RTSP feeds
      #- "8555:8555/tcp" # WebRTC over tcp
      #- "8555:8555/udp" # WebRTC over udp
    environment:
      REOLINK_USERNAME: "${REOLINK_USERNAME}"
      REOLINK_PASSWORD: "${REOLINK_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:2025.6
    volumes:
      - $DATA_DIR/esphome/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: "no"
    privileged: true
    network_mode: host
    environment:
      - USERNAME=${ESPHOME_USERNAME}
      - PASSWORD=${ESPHOME_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:6052 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    depends_on:
      mosquitto:
        condition: service_healthy
      eufy-security-ws:
        condition: service_healthy
      zigbee2mqtt:
        condition: service_healthy
      frigate:
        condition: service_healthy
      esphome:
        condition: service_healthy
    volumes:
      - $DATA_DIR/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    restart: "no"
    privileged: true
    network_mode: host
