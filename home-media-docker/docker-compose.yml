version: '3.7'
services:
  vpn:
    image: dperson/openvpn-client
    # cap_add, security_opt, and volume required for the image to function
    cap_add:
    - net_admin
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      TZ: 'EST5EDT'
    networks:
    - default
    read_only: true
    tmpfs:
    - /run
    - /tmp
    restart: unless-stopped
    security_opt:
    - label:disable
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "ip addr show tun0 2>/dev/null | grep -q 'inet ' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
    - /dev/net:/dev/net:z
    - $DATA_DIR/openvpn/conf:/vpn
    # Put .ovpn configuration file in the /vpn directory (in "volumes:" above or
    # launch using the command line arguments, IE pick one:
    # command: 'server;user;password[;port]'
    #
  plex:
    image: lscr.io/linuxserver/plex:latest
    depends_on:
      bazarr:
        condition: service_started
    container_name: plex
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - VERSION=docker
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - $DATA_DIR/plex/config:/config
      - $DATA_DIR/plex/transcode:/transcode
      - $MEDIA_ROOT:/data
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    depends_on:
      sonarr:
        condition: service_started
    network_mode: host
    container_name: radarr
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ="America/Edmonton"
      - UMASK_SET=022 #optional
    volumes:
      - $DATA_DIR/radarr/config:/config
      - $MEDIA_ROOT/Movies:/movies
      - $MEDIA_ROOT/Complete:/downloads
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr
    depends_on:
      deluge:
        condition: service_healthy
      sabnzbd:
        condition: service_healthy
    network_mode: host
    container_name: sonarr
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ="America/Edmonton"
      - UMASK_SET=022 #optional
    volumes:
      - $DATA_DIR/sonarr/config:/config
      - $MEDIA_ROOT/TV:/tv
      - $MEDIA_ROOT/Complete:/downloads
    restart: unless-stopped

  jackett:
    image: linuxserver/jackett
    depends_on:
      radarr:
        condition: service_started
    network_mode: host
    container_name: jackett
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ="America/Edmonton"
    volumes:
      - $DATA_DIR/jackett/config:/config
    restart: unless-stopped

  sabnzbd:
    image: linuxserver/sabnzbd
    depends_on:
      vpn:
        condition: service_healthy
      deluge:
        condition: service_healthy
    network_mode: service:vpn
    container_name: sabnzbd
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ="America/Edmonton"
    volumes:
      - $DATA_DIR/sabnzbd/config:/config
      - $MEDIA_ROOT/Complete:/downloads
      - $MEDIA_ROOT/incomplete:/incomplete-downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  deluge:
    image: linuxserver/deluge
    depends_on:
      vpn:
        condition: service_healthy
    network_mode: service:vpn
    container_name: deluge
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ="America/Edmonton"
      - UMASK_SET=022 #optional
      - DELUGE_LOGLEVEL=error #optional
    volumes:
      - $DATA_DIR/deluge/config:/config
      - $MEDIA_ROOT/Complete:/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8112 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    depends_on:
      prowlarr:
        condition: service_started
    container_name: overseerr
    network_mode: host
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ="America/Edmonton"
    volumes:
      - $DATA_DIR/overseer/config:/config
    restart: unless-stopped
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    depends_on:
      overseerr:
        condition: service_started
    container_name: tautulli
    network_mode: host
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ="America/Edmonton"
    volumes:
      - $DATA_DIR/tautulli/config:/config
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    depends_on:
      tautulli:
        condition: service_started
    container_name: bazarr
    network_mode: host
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ=America/Edmonton
    volumes:
      - $DATA_DIR/bazarr/config:/config
      - $MEDIA_ROOT/Movies:/movies
      - $MEDIA_ROOT/TV:/tv
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    depends_on:
      jackett:
        condition: service_started
    container_name: prowlarr
    network_mode: host
    environment:
      - PUID=$UUID
      - PGID=$GUID
      - TZ=America/Edmonton
    volumes:
      - $DATA_DIR/prowlarr/config:/config
    restart: unless-stopped


  web:
    image: nginx
    environment:
    - TZ="America/Edmonton"
    depends_on:
    - deluge
    - sabnzbd
    - sonarr
    - radarr
    - jackett
    - prowlarr
    - overseerr
    - tautulli
    - bazarr
    - plex
    links:
    - vpn:deluge
    - vpn:sabnzbd
    networks:
    - default
    ports:
    - "8080:8080"
    - "8112:8112"
    read_only: true
    tmpfs:
    - /run
    - /tmp
    - /var/cache/nginx
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - $PWD/nginx/default.conf:/etc/nginx/nginx.conf
